:var(--ink);font-family:var(--mono);font-size:12px;padding:10px 14px;border-radius:10px;align-items:center;gap:8px}.scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:40}@media print{body{background:#fff;color:#111}.side,.menu-btn,.scrim,.pager,.cc-btn,.nav,.lightbox{display:none!important}.app{display:block}.view{padding:24px;max-width:100%}.cert,.completion-banner{display:block!important;color:#111;border-color:#111;background:#fff}}@media(max-width:1060px){.app{grid-template-columns:1fr}.side{position:fixed;left:-320px;width:304px;transition:left .2s}.side.open{left:0}.scrim.show{display:block}.menu-btn{display:flex}.view{padding:74px 22px 96px}.grid2,.grid3,.shot-caption{grid-template-columns:1fr}.checkpoint,.shot-head,.hotspot-panel{grid-template-columns:1fr}.pager{grid-template-columns:1fr}.pg.next{text-align:left}table{overflow-x:auto}thead,tbody,tr{min-width:680px}.shot-frame{max-height:420px}}

<script>
const ASSET='course-assets/screenshots/';
const COURSE={
  title:'LegalEase Command Center Course Manual',
  subtitle:'A practical course for running the LegalEase operating system day to day.',
  promise:'By the end of this course, Roger will know how to start the day in Today, capture tasks and blockers, run Growth, manage Partners and RCAP, operate Production, upload campaigns, generate and review images, manage Wilma usage, track manual posts and results, capture Proof, use Le-E, close the day, and understand what is safe/offline versus live/connected.',
  off:['Live social posting','Email sending','External scheduling','External calendar writes','Automatic publishing','Dashboard activation','External actions','Social account connections'],
  safety:['Publishing is off until explicitly approved.','Manual only means Roger acts outside the OS.','Internal schedules do not schedule on social platforms.','Generated images require review before use.','No external email, posting, calendar, or provider action happens from this course.','RCAP means Record Clearing Access Program only.'],
  glossary:[
    ['Today','The daily founder standup. Example: review the intention, Now block, Top 3, and closeout.'],['Growth','Marketing, PR, campaigns, proof-to-content, and growth stats. Example: turn a proof item into a post idea.'],['Partners','Partner pipeline, follow-ups, active programs, RCAP access, and partner proof.'],['Production','Content queue, campaign upload, image generation workflow, platform preview, internal schedule, manual results.'],['Proof','Wins, evidence, metrics, reports, investor proof, partner proof, data room, and proof gaps.'],['More','Utility center for App Status, Recovery Mode, guide, privacy, exports, and support tools.'],['RCAP','Record Clearing Access Program. It is a partner program review workflow, not recovery mode.'],['Campaign Upload','A Production workflow for importing CSV posts into internal drafts after preview.'],['Internal Schedule','A planning schedule inside the OS only. It does not schedule on platforms.'],['Manual Publishing','Roger posts outside the OS, then marks the item manually published.'],['Generate Image','Creates or requests a visual for review before attaching to a post.'],['Overlay Text','Editable headline, subhead, and CTA text for generated visuals.'],['Wilma','LegalEase guide character used for explainers, checklists, FAQs, and friendly guidance.'],['Le-E','Assistant for rewriting, summarizing, drafting, and capturing internal work.'],['App Status','Calm health and safety page for checking whether the Command Center is protected.'],['Recovery Mode','Support screen for getting back to Today when something breaks.'],['Publishing is off','No live publishing is connected. Nothing has been published by the OS.'],['Manual only','The OS prepares work; Roger completes live action outside the OS.'],['Proof Gaps','Missing evidence or stale metrics that should be filled.'],['Investor Update Builder','Proof workflow that creates an internal investor update draft for review.']
  ],
  parts:[{name:'Part 1: Learn The Operating System',modules:[1,2,3]},{name:'Part 2: Run The Workspaces',modules:[4,5,6,7,8]},{name:'Part 3: Handle Creative And Proof',modules:[9,10,11,12]},{name:'Part 4: Keep The OS Clean',modules:[13,14,15]}],
  modules:[
    {id:1,title:'Command Center Basics',objective:'Understand what the Command Center is, what it is not, and where each kind of work belongs.',solves:'The OS is powerful, but it only works if you know which page owns which job.',keyIdea:'Start in Today unless you came to complete a specific task.',visual:{type:'map'},sections:[['The daily loop',['Open Today','Read the intention','Work the Now block','Capture loose work','Route work to the right workspace','Return for closeout']],['Weekly loop',['Review Growth, Partners, Production, Proof','Update metrics','Capture proof','Plan next week']]],walk:['Open the Command Center.','Name the purpose of Today, Growth, Partners, Production, Proof, More, and RCAP.','Identify what is currently off.','Open More and locate App Status and Recovery Mode.','Return to Today.'],exercise:'Match five real pieces of work to the right workspace before clicking anywhere.',quiz:[['Where should Roger start most days?','Today.'],['Which page owns metrics?','Proof.'],['Does the OS publish live right now?','No.'],['What does manual only mean?','Roger acts outside the OS.']],checkpoint:'You can explain the OS map and the safety rules in plain English.'},
    {id:2,title:'Starting The Day In Today',objective:'Use Today as the founder standup.',solves:'Today protects the day from becoming random.',keyIdea:'Today is a decision page, not a dashboard.',screen:'today',sim:'today',walk:['Read the “Today is for…” intention.','Use Rewrite with Le-E if the intention needs sharpening.','Read Now and Start with.','Check Today’s Flow.','Confirm Top 3.','Review Needs Attention, Needs Follow-Up, and Pressing.','Use Quick Capture.','Close the day.'],exercise:'Rewrite the daily intention, capture one task, add one blocker, identify one pressing item, and close the day.',quiz:[['What should you read before doing work?','Intention, Now, Today’s Flow, Top 3, and Needs Attention.'],['What does Quick Capture prevent?','Loose work disappearing.'],['What should closeout name?','What moved, what carries forward, and tomorrow’s first move.']],checkpoint:'You can run the Today loop in under ten minutes.'},
    {id:3,title:'Quick Capture And Daily Operating Loop',objective:'Capture work quickly and route it correctly.',solves:'Loose thoughts become useful only when they have type and next action.',keyIdea:'Capture the item. Name the type. Add the next action. Route it.',sim:'routing',sections:[['Capture types',['Task: action needed','Decision: Roger must choose','Blocker: progress is stopped','Post Idea: content seed','Note: context worth keeping']]],walk:['Open Quick Capture.','Write the item in plain English.','Choose Task, Decision, Blocker, Post Idea, or Save.','Add one next action.','Route to Today, Growth, Partners, Production, Proof, or RCAP.'],exercise:'Capture one task, one decision, one blocker, one post idea, and one note.',quiz:[['What is wrong with “follow up”?','It lacks who, why, and next action.'],['Where should a post idea go?','Growth or Production depending on readiness.']],checkpoint:'You can capture five item types and route each one.'},
    {id:4,title:'Growth Workspace',objective:'Run marketing, social ideas, PR outreach, campaigns, proof-to-content, and growth stats.',solves:'Growth keeps demand generation from scattering across notes.',keyIdea:'Growth decides what should be made. Production makes it ready.',screen:'growth',walk:['Read Growth Summary.','Review Next Growth Move.','Open Social Media Manager.','Move ideas through Post Ideas, Drafts, Ready to Publish, Published Manually.','Review PR Outreach, Campaigns, Proof to Content, and Growth Stats.'],exercise:'Add a post idea, turn proof into a post, draft a PR pitch, and update one stat.',quiz:[['Does Growth publish posts?','No.'],['What happens after Roger manually posts?','Mark Published Manually and add results.']],checkpoint:'You can move one growth idea toward production.'},
    {id:5,title:'Partners Workspace',objective:'Manage partner pipeline, follow-ups, active programs, RCAP access, and partner proof.',solves:'Partner work stalls when follow-ups are not visible.',keyIdea:'Check follow-ups before adding new outreach.',screen:'partners',walk:['Read Partner Summary.','Review Next Partner Move.','Check Active Programs and RCAP Program.','Work Follow-Ups.','Review Partner Pipeline and Partner Proof.','Add partner notes after calls.'],exercise:'Add one partner, add one follow-up, open RCAP Program, and capture partner proof.',quiz:[['Does Partners send emails?','No.'],['Where does RCAP live?','As one active program inside the partner workflow.']],checkpoint:'You can identify the next partner action and RCAP access point.'},
    {id:6,title:'RCAP Program Review',objective:'Review Record Clearing Access Program materials and decide whether the packet is ready for manual handoff.',solves:'RCAP needs a clear readiness decision, not vague progress.',keyIdea:'RCAP means Record Clearing Access Program only.',screen:'rcap',sim:'rcap',walk:['Open RCAP Program.','Read the next decision.','Review Ready, Missing, and Needs decision.','Review Partner Summary and Review Packet.','Check Roger’s Next Steps and Safety Status.','Add a review note.','Only mark ready when missing items are resolved.'],exercise:'Identify one missing item, one decision, and the safe next action.',quiz:[['What does Mark Ready for Manual Handoff do?','Records internal readiness only.'],['Does it send anything?','No.']],checkpoint:'You can make an RCAP readiness decision safely.'},
    {id:7,title:'Production Workspace',objective:'Create, generate images, preview, schedule internally, mark manual publishing, and track results.',solves:'Production turns content into reviewed assets without pretending anything went live.',keyIdea:'Production prepares. Roger publishes manually outside the OS.',screen:'production',sim:'production',walk:['Read Production Summary.','Use Campaign Upload if importing a plan.','Move posts through Content Queue.','Generate and review images in Image Studio.','Use Platform Preview.','Add to Internal Schedule.','Mark Published Manually only after Roger posts outside the OS.','Add Results.'],exercise:'Create one post, generate or request an image, preview it, schedule internally, mark manual publishing after outside posting, and add a result.',quiz:[['Does Internal Schedule schedule on LinkedIn?','No.'],['Should images be attached without review?','No.']],checkpoint:'You can move a post through Production without live publishing.'},
    {id:8,title:'Campaign Upload',objective:'Upload a spreadsheet, preview rows, and turn approved rows into internal drafts.',solves:'Campaign Upload brings a 30-day content plan into Production without manual row-by-row creation.',keyIdea:'Confirm Import creates internal drafts only.',screen:'campaign',sim:'campaign',sections:[['Minimum required columns',['Date','Platform','Caption']],['Optional planning columns',['Time','Campaign','Post Type','Topic','Headline','Subhead','CTA','Link','Audience','Goal','Tone','Image Direction','Overlay Text','Wilma Preference','Approval Owner','Status','Notes']]],walk:['Open Production.','Find Campaign Upload.','Click Upload Spreadsheet.','Choose a CSV file.','Confirm Date, Platform, and Caption exist.','Review Import Preview.','Fix issues or Confirm Import.','Check Content Queue for internal drafts.'],exercise:'Create a five-day CSV, upload it, review preview, confirm import, and check the internal schedule.',quiz:[['What happens if Caption is missing?','The file must be fixed before import.'],['Does Confirm Import publish?','No.']],checkpoint:'You can import a campaign without posting or scheduling externally.'},
    {id:9,title:'Image Generation And Overlay Text',objective:'Generate, review, approve, and attach visuals before posts move into review.',solves:'Image workflow prevents unreviewed visuals from entering public-ready content.',keyIdea:'Generated does not mean approved.',screen:'production',sim:'image',walk:['Open Production.','Choose a post needing an image.','Click Generate Image.','Review the generated or requested image state.','Edit overlay headline, subhead, CTA, placement, alignment, and style.','Approve the image.','Attach to post.','Preview by platform.'],exercise:'Generate an image for one post, add overlay text, approve it, and preview it.',quiz:[['What does Image: Requested mean?','A request exists, but no final approved image is attached.'],['What should overlay text avoid?','Tiny or unreadable text.']],checkpoint:'You can explain every image state.'},
    {id:10,title:'Wilma Usage',objective:'Decide when Wilma should appear in content.',solves:'Wilma is helpful for guidance, but not every post should use her.',keyIdea:'Use Wilma for explainers and friendly guidance. Do not use Wilma for serious proof or trauma-sensitive posts.',sim:'wilma',sections:[['Wilma outcomes',['Use Wilma','Wilma optional','Use Wilma as helper','Do not use Wilma','Never use Wilma']]],walk:['Review the post type.','Ask whether the tone is friendly guidance or serious proof.','Use approved Wilma reference assets.','Do not generate Wilma from scratch.','Override recommendations when the content is serious or sensitive.'],exercise:'Review five sample posts and choose the correct Wilma outcome.',quiz:[['FAQ about expungement?','Use Wilma.'],['Investor traction update?','Do not use Wilma.'],['Trauma-sensitive story?','Never use Wilma.']],checkpoint:'You can choose Wilma or no Wilma for each post.'},
    {id:11,title:'Proof Workspace',objective:'Capture wins, evidence, metrics, reports, and investor-ready proof.',solves:'Proof turns work into evidence Roger can use with investors, partners, and content.',keyIdea:'Metrics belong under Proof.',screen:'proof',sim:'proof',walk:['Read Proof Summary.','Review Wins and Evidence.','Update Metrics / KPIs.','Use Investor Update Builder.','Review Reports, Investor Proof, Partner Proof, Data Room, and Proof Gaps.'],exercise:'Capture one win, link one evidence item, update one metric, and generate an investor-ready proof note.',quiz:[['Where do metrics live?','Proof.'],['Can reports be sent externally from Proof?','No. Internal drafts only.']],checkpoint:'You can turn activity into proof.'},
    {id:12,title:'Le-E Assistant',objective:'Use Le-E to rewrite, summarize, draft, and route internal work.',solves:'Le-E saves time when the request is specific and safe.',keyIdea:'Ask Le-E for one clear internal action at a time.',screen:'today',walk:['Open the Le-E bubble.','Ask for one specific task.','Review output.','Save as task, note, post, pitch, or update.','If Le-E cannot complete the action, save a note or task.'],exercise:'Ask Le-E to rewrite Today’s intention, draft one post, and summarize a partner follow-up.',quiz:[['Can Le-E publish or send email?','No.'],['What is the fallback if Le-E cannot act?','Save a note or task.']],checkpoint:'You can use Le-E without assuming live action happened.'},
    {id:13,title:'Closeout And Weekly Rhythm',objective:'End the day cleanly and keep weekly review useful.',solves:'Closeout turns activity into continuity.',keyIdea:'Close today before planning tomorrow.',sim:'closeout',walk:['Return to Today.','Record what got done.','Choose what carries forward.','Write tomorrow’s first move.','Weekly: review Growth, Partners, Production, Proof, and blockers.'],exercise:'Complete a daily closeout and a short weekly review.',quiz:[['What should closeout produce?','Tomorrow’s first move.'],['Why review Proof weekly?','To turn movement into evidence.']],checkpoint:'You can close a day and plan tomorrow.'},
    {id:14,title:'Safety, Manual-Only, And What Is Off',objective:'Understand what the OS can prepare internally and what it cannot do live yet.',solves:'This prevents accidental assumptions about posting, email, scheduling, and connected accounts.',keyIdea:'Internal means internal. Manual means Roger acts outside the OS.',sim:'safety',sections:[['Visible safety labels',['Posting is off','Publishing is off','Manual only','Internal schedule only','Nothing has been published by the OS','Live posting is not connected yet']]],walk:['Look for safety labels.','Treat prepared work as internal.','Mark manual actions only after they happen outside the OS.','Use Connected Accounts as future setup context.','Use App Status if something looks wrong.'],exercise:'Explain what the OS prepared and what Roger still needs to do manually for one post.',quiz:[['Does Internal Schedule post?','No.'],['Does Prepare Email send email?','No.'],['Are connected accounts active?','No.']],checkpoint:'You can explain what is off and safe.'},
    {id:15,title:'Troubleshooting',objective:'Recover calmly when upload, image generation, disabled buttons, or pages fail.',solves:'Troubleshooting stops over-clicking and guessing.',keyIdea:'Read the visible message first, then check the right support screen.',screen:'more',sim:'troubleshoot',walk:['Read the visible message.','If upload fails, check Date, Platform, Caption.','If image generation fails, save the request and check Image Studio.','If a button is disabled, read the reason.','If a page looks broken, open App Status.','If the app loads Recovery Mode, use Back to Today or Try full app again.'],exercise:'Try a CSV missing Caption, read the error, fix it, and upload again.',quiz:[['Where do you go if a page looks broken?','App Status.'],['What should an issue report include?','Page, button clicked, expected result, actual result, screenshot if available.']],checkpoint:'You can recover from common issues and report clearly.'}

let state={current:'home',done:{},checks:{},sims:{},hotspots:{},prodStep:0};
const STORAGE_KEY='legaleaseCourseProgressV2';
const KEYS=['home',...COURSE.modules.map(m=>'m'+m.id),'project'];
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function loadState(){try{const saved=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');state={...state,...saved,current:saved.current||'home'}}catch{}}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify({current:state.current,done:state.done,checks:state.checks,sims:state.sims,hotspots:state.hotspots,prodStep:state.prodStep}))}
function renderSection(pair){return '<h3>'+esc(pair[0])+'</h3><ul class="bul">'+pair[1].map(i=>'<li>'+esc(i)+'</li>').join('')+'</ul>'}
function moduleHTML(m){let h='<div class="kicker">Module '+m.id+'</div><h2 class="title">'+esc(m.title)+'</h2><p class="obj">'+esc(m.objective)+'</p><div class="card tight"><h4>What this part of the OS is for</h4><p class="muted">'+esc(m.solves)+'</p></div><div class="keyidea"><div class="lbl">Key Idea</div><p>'+esc(m.keyIdea)+'</p></div>';h+=beforeClick(m);if(m.visual?.type==='map')h+=osMap();if(m.screen)h+=screenComponent(m.screen);if(m.sections)m.sections.forEach(s=>h+=renderSection(s));h+='<h3>Step-By-Step Walkthrough</h3><ol class="steps">'+m.walk.map(i=>'<li>'+esc(i)+'</li>').join('')+'</ol>';if(m.sim)h+=simComponent(m.sim);h+='<div class="exercise"><div class="lbl">Practice Exercise</div><p>'+esc(m.exercise)+'</p></div>';h+='<h3>Common Buttons And What They Do</h3>'+buttonGuide(m.id);h+='<h3>Mistakes To Avoid</h3><ul class="bul bad">'+mistakes(m.id).map(i=>'<li>'+esc(i)+'</li>').join('')+'</ul>';h+='<h3>Quiz</h3><div class="quiz">';m.quiz.forEach((q,i)=>{h+='<div class="q" id="q-'+m.id+'-'+i+'"><div class="qtop"><span class="qn">Q'+(i+1)+'</span><span class="qtext">'+esc(q[0])+'</span><button class="reveal" onclick="toggleQ(\''+m.id+'\','+i+')">Show answer</button></div><div class="ans"><div class="al">Answer</div>'+esc(q[1])+'</div></div>'});h+='</div>';h+='<div class="checkpoint"><div class="cc-body"><div class="lbl">Completion Checkpoint</div><p>'+esc(m.checkpoint)+'</p></div><button class="cc-btn '+(state.done['m'+m.id]?'done':'')+'" onclick="toggleDone(\'m'+m.id+'\')">'+(state.done['m'+m.id]?'Completed':'Mark complete')+'</button></div>';h+=pager('m'+m.id);return h}
function beforeClick(m){const text={7:'Before you click Schedule Internally or Mark Published Manually, confirm you are recording internal planning or an outside manual action.',8:'Before you click Confirm Import, check Date, Platform, and Caption. Nothing should be saved until the preview looks right.',6:'Before you mark RCAP ready, resolve missing information and review the Safety Status.',14:'Before any publishing-related action, remember live posting is off and external actions are disabled.'}[m.id]||'Before you click, ask: what will this change internally, and what still requires Roger outside the OS?';return '<div class="warnbox"><div class="lbl">Before You Click</div><p>'+esc(text)+'</p></div>'}
function buttonGuide(id){const map={2:['Rewrite with Le-E: asks for a sharper intention.','Save / Task / Decision / Blocker / Post Idea: stores Quick Capture internally.','Close the Day: records closeout internally.'],4:['Add Idea: saves a content seed.','Draft Pitch: prepares PR copy internally.','Update Stat: records a manual number.'],5:['Open RCAP Program: routes to Record Clearing Access Program review.','Add Note: saves context.','Move Stage: changes internal pipeline status.'],6:['Review Packet: opens internal materials.','Mark Ready for Manual Handoff: records readiness only.','Add Review Note: saves Roger’s note.'],7:['Generate Image: creates or saves an image request for review.','Preview: opens platform preview.','Mark Published Manually: record only after Roger posts outside the OS.'],8:['Upload Spreadsheet: opens a file picker.','Confirm Import: creates internal drafts only.','Fix Issues: keeps import from saving incomplete rows.'],11:['Add Proof: saves evidence internally.','Generate Investor Update: creates a review-ready draft only.','Add to Data Room: organizes materials internally.']};return '<div class="card tight"><ul class="bul">'+(map[id]||['Open: route to the relevant workspace.','Save: record the item internally.','Back to Today: return to the daily loop.']).map(i=>'<li>'+esc(i)+'</li>').join('')+'</ul></div>'}
function mistakes(id){return {2:['Treating Today like a menu instead of a standup.','Skipping closeout.'],4:['Using Growth as Production.','Assuming Ready to Publish means posted.'],5:['Letting Add Partner dominate before reviewing follow-ups.'],6:['Confusing RCAP with recovery mode.','Marking ready while information is missing.'],7:['Calling internal schedule a platform schedule.','Attaching generated images without review.'],8:['Showing all spreadsheet rules before reviewing the simple workflow.','Confirming import without required columns.'],10:['Using Wilma for trauma-sensitive or serious proof posts.'],11:['Letting metrics overshadow evidence.','Treating reports as sent externally.'],14:['Assuming manual-only means automatic later.'],15:['Over-clicking instead of reading the message.']}[id]||['Skipping the visible safety copy.','Leaving work without a next action.']}
function screenComponent(key){const s=SCREENS[key];if(!s)return '';const hot=s.hotspots||[];const idx=state.hotspots[key]||0;let h='<section class="screenshot-card" data-screen="'+key+'"><div class="shot-head"><div><h4>Screen: '+esc(s.title)+'</h4><p>'+esc(s.desc)+'</p></div><button class="light-btn" onclick="openLightbox(\''+ASSET+s.img+'\',\''+esc(s.title)+'\')">Open larger</button></div><div class="shot-shell"><div class="shot-frame"><img src="'+ASSET+s.img+'" alt="'+esc(s.title)+' screenshot" onclick="openLightbox(\''+ASSET+s.img+'\',\''+esc(s.title)+'\')" onerror="this.parentElement.classList.add(\'missing\');this.remove();this.parentElement.innerHTML=\'<div>Screenshot needed</div>\'">';hot.forEach((p,i)=>{h+='<button class="hotspot '+(i===idx?'active':'')+'" style="--x:'+p[2]+'%;--y:'+p[3]+'%" onclick="setHotspot(\''+key+'\','+i+')" aria-label="Hotspot '+(i+1)+': '+esc(p[0])+'">'+(i+1)+'</button>'});h+='</div></div><div class="shot-caption"><div><h4>What to look for</h4><ul class="look-list">'+(s.look||[]).map(i=>'<li>'+esc(i)+'</li>').join('')+'</ul></div><div>'+(s.mistake?'<div class="common"><strong>Common mistake</strong><br>'+esc(s.mistake)+'</div>':'')+(s.tryThis?'<div class="try-this"><strong>Try this</strong><br>'+esc(s.tryThis)+'</div>':'')+'</div></div>';if(hot.length){const p=hot[idx];h+='<div class="hotspot-panel"><div><div class="hotspot-count">Hotspot '+(idx+1)+' of '+hot.length+'</div><strong>'+esc(p[0])+'</strong><p>'+esc(p[1])+'</p></div><div class="hotspot-controls"><button onclick="prevHotspot(\''+key+'\')">Previous</button><button onclick="nextHotspot(\''+key+'\')">Next hotspot</button></div></div>'}h+='</section>';return h}
function simComponent(key){const sim=SIMS[key];return '<section class="sim"><h4>'+esc(sim.title)+'</h4><p class="muted">'+esc(sim.body)+'</p><div>'+sim.render()+'</div><div class="sim-output" id="sim-out-'+key+'">'+(state.sims[key]?'Completed: '+esc(state.sims[key]):'Practice result will appear here.')+'</div></section>'}
function osMap(){return '<h3>Quick Map Of The OS</h3><div class="course-map">'+[['Today','Daily standup'],['Growth','Marketing and PR'],['Partners','Relationships and RCAP'],['Production','Posts, images, schedule'],['Proof','Evidence and metrics'],['More','Support utilities']].map(x=>'<div class="map-card"><strong>'+x[0]+'</strong><span>'+x[1]+'</span></div>').join('')+'</div>'+decisionTree('routing')}
function decisionTree(type){const trees={routing:[['Task','Today / Quick Capture','good'],['Post idea','Growth','good'],['Partner follow-up','Partners','good'],['Post asset','Production','good'],['Win, evidence, or metric','Proof','good'],['RCAP material','RCAP Program','warn'],['System issue','More / App Status / Recovery Mode','warn']],safety:[['Is posting connected?','No. Keep it internal.','warn'],['Is this approved?','If no, keep in review.','warn'],['Was it manually posted outside the OS?','If yes, mark manually published.','good'],['If not posted outside the OS','Do not mark published.','warn']],trouble:[['Upload fails','Check Date, Platform, Caption.','warn'],['Button disabled','Read the disabled reason.','warn'],['Image generation fails','Save request and check Image Studio.','warn'],['Page looks broken','Open App Status.','warn'],['Full app does not load','Open Recovery Mode.','warn']]};return '<div class="decision-tree">'+trees[type].map(n=>'<div class="tree-node '+n[2]+'"><strong>'+esc(n[0])+'</strong><span>'+esc(n[1])+'</span></div>').join('')+'</div>'}
function wilmaQuiz(){const rows=[['FAQ about expungement','Use Wilma'],['Investor traction update','Do not use Wilma'],['Trauma-sensitive customer story','Never use Wilma'],['Checklist post','Use Wilma as helper'],['Product walkthrough','Use Wilma']];return rows.map((r,i)=>'<div class="card tight"><strong>'+esc(r[0])+'</strong><div class="sim-grid">'+['Use Wilma','Wilma optional','Use Wilma as helper','Do not use Wilma','Never use Wilma'].map(a=>'<button class="sim-choice" onclick="simFeedback(this,'+(a===r[1])+',\''+(a===r[1]?'Correct: ':'Try again: ') + esc(r[1]).replace(/'/g,'&#39;')+'\')">'+a+'</button>').join('')+'</div></div>').join('')}
function homeHTML(){let h='<div class="hero"><div class="kicker">Founder Operator Training</div><h2 class="title">LegalEase Command Center Course Manual</h2><p class="promise">'+esc(COURSE.promise)+'</p><div class="hero-actions"><button class="start-btn" onclick="go(\'m1\')">Start Module 1 →</button><button class="light-btn" onclick="go(\'project\')">View Final Project</button></div><p class="note">15 modules · visual walkthroughs · practice simulations · local progress only</p></div>';h+='<div class="completion-banner '+(courseComplete()?'show':'')+'"><h3>Course Complete</h3><p>Roger is operator-ready. Completed '+new Date().toLocaleDateString()+'.</p><button class="primary" onclick="window.print()">Print Certificate</button></div>';h+='<h3>What Is Currently Off</h3><div class="card"><div class="pill-row">'+COURSE.off.map(o=>'<span class="pill-off">'+esc(o)+'</span>').join('')+'</div></div>';h+='<h3>Non-Negotiable Safety Rules</h3><div class="safe-card"><ul class="bul good">'+COURSE.safety.map(s=>'<li>'+esc(s)+'</li>').join('')+'</ul></div>';h+=osMap();h+='<h3>Screen Examples</h3><div class="grid2">'+['today','growth','partners','production','campaign','proof','more','rcap','status','recovery'].map(k=>'<div class="map-card"><strong>'+esc(SCREENS[k].title)+'</strong><span>'+esc(SCREENS[k].desc)+'</span></div>').join('')+'</div>';h+=glossaryHTML();h+=pager('home');return h}
function glossaryHTML(){return '<h3>Interactive Glossary</h3><input class="glossary-search" id="glossarySearch" placeholder="Search glossary…" oninput="filterGlossary()" aria-label="Search glossary"><div class="glossary-panel" id="glossaryPanel">'+COURSE.glossary.map(g=>'<details class="glossary-item" data-term="'+esc((g[0]+' '+g[1]).toLowerCase())+'"><summary>'+esc(g[0])+'</summary><p>'+esc(g[1])+'</p></details>').join('')+'</div>'}
function projectHTML(){const p=COURSE.project;let h='<div class="kicker">Final Course Project</div><h2 class="title">'+esc(p.title)+'</h2><p class="obj">'+esc(p.goal)+'</p><div class="exercise"><div class="lbl">Scenario</div><p>'+esc(p.scenario)+'</p></div><h3>Project Steps</h3><ol class="steps">'+p.steps.map(s=>'<li>'+esc(s)+'</li>').join('')+'</ol>'+simComponent('production')+simComponent('proof')+'<h3>Project Checklist</h3><div class="card"><div class="check-grid">';p.checklist.forEach((c,i)=>{const k='proj-'+i;h+='<div class="ci '+(state.checks[k]?'checked':'')+'" onclick="toggleCheck(\''+k+'\')"><span class="box"></span><span class="ct">'+esc(c)+'</span></div>'});h+='</div></div><h3>Sample 7-Day Campaign CSV</h3><p class="muted">Copy this into a spreadsheet, save as CSV, then upload through Campaign Upload.</p><div class="copybar"><span class="note">campaign.csv</span><button class="copy" onclick="copyCSV(this)">Copy CSV</button></div><div class="codeblock" id="csvBlock">'+esc(p.csv)+'</div><h3>Graduation Standard</h3><ul class="bul good">'+p.graduation.map(g=>'<li>'+esc(g)+'</li>').join('')+'</ul><div class="checkpoint"><div class="cc-body"><div class="lbl">Final Checkpoint</div><p>I can run the Command Center workflow end to end and explain what stayed internal.</p></div><button class="cc-btn '+(state.done.project?'done':'')+'" onclick="toggleDone(\'project\')">'+(state.done.project?'Graduated':'Mark graduated')+'</button></div>';if(courseComplete())h+='<div class="cert"><div class="seal">★</div><h3>Course Complete</h3><p>Roger is operator-ready.</p><p class="muted">Date completed: '+new Date().toLocaleDateString()+'</p><button class="primary" onclick="window.print()">Print Certificate</button></div>';h+=pager('project');return h}
function pager(cur){const i=KEYS.indexOf(cur),prev=KEYS[i-1],next=KEYS[i+1];const label=k=>k==='home'?'Overview':k==='project'?'Final Project':'Module '+COURSE.modules.find(m=>'m'+m.id===k).id;return '<div class="pager">'+(prev?'<button class="pg" onclick="go(\''+prev+'\')"><div class="pl">← Previous</div><div class="pt">'+label(prev)+'</div></button>':'<span></span>')+(next?'<button class="pg next" onclick="go(\''+next+'\')"><div class="pl">Next →</div><div class="pt">'+label(next)+'</div></button>':'<span></span>')+'</div>'}
function buildNav(){let h='<button class="nav-item '+(state.current==='home'?'active':'')+'" onclick="go(\'home\')"><span class="nav-num">·</span><span>Overview & Rules</span></button>';COURSE.parts.forEach(part=>{h+='<div class="nav-part">'+esc(part.name)+'</div>';part.modules.forEach(id=>{const m=COURSE.modules.find(x=>x.id===id),k='m'+id;h+='<button class="nav-item '+(state.current===k?'active':'')+'" onclick="go(\''+k+'\')"><span class="dot '+(state.done[k]?'done':'')+'"></span><span class="nav-num">'+String(id).padStart(2,'0')+'</span><span>'+esc(m.title)+'</span></button>'})});h+='<div class="nav-part">Capstone</div><button class="nav-item special '+(state.current==='project'?'active':'')+'" onclick="go(\'project\')"><span class="dot '+(state.done.project?'done':'')+'"></span><span class="nav-num">★</span><span>Final Project</span></button>';document.getElementById('nav').innerHTML=h}
function updateProgress(){const total=COURSE.modules.length+1;const n=COURSE.modules.filter(m=>state.done['m'+m.id]).length+(state.done.project?1:0);const pct=Math.round(n/total*100);document.getElementById('progFill').style.width=pct+'%';document.getElementById('progPct').textContent=pct+'%'}
function render(){const v=document.getElementById('view');v.innerHTML=state.current==='home'?homeHTML():state.current==='project'?projectHTML():moduleHTML(COURSE.modules.find(m=>'m'+m.id===state.current));buildNav();updateProgress();saveState();setTimeout(()=>v.focus(),0);window.scrollTo(0,0)}
function go(k){state.current=k;closeMenu();render()}function toggleQ(mid,i){document.getElementById('q-'+mid+'-'+i).classList.toggle('open')}function toggleDone(k){state.done[k]=!state.done[k];render()}function toggleCheck(k){state.checks[k]=!state.checks[k];render()}function courseComplete(){return COURSE.modules.every(m=>state.done['m'+m.id])&&state.done.project}function copyCSV(btn){navigator.clipboard.writeText(COURSE.project.csv).then(()=>{btn.textContent='Copied ✓';setTimeout(()=>btn.textContent='Copy CSV',1600)})}
function setHotspot(k,i){state.hotspots[k]=i;render()}function nextHotspot(k){const len=SCREENS[k].hotspots.length;state.hotspots[k]=((state.hotspots[k]||0)+1)%len;render()}function prevHotspot(k){const len=SCREENS[k].hotspots.length;state.hotspots[k]=((state.hotspots[k]||0)-1+len)%len;render()}
function markMissingScreenshot(img){ const frame=img.parentElement; if(frame){ frame.classList.add('missing'); frame.innerHTML='<div>Screenshot needed</div>'; } }function openLightbox(src,cap){document.getElementById('lightboxImg').src=src;document.getElementById('lightboxCaption').textContent=cap;document.getElementById('lightbox').classList.add('open')}function closeLightbox(){document.getElementById('lightbox').classList.remove('open')}document.getElementById('lightbox').addEventListener('click',e=>{if(e.target.id==='lightbox')closeLightbox()});document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox()});
function simFeedback(btn,ok,msg){btn.classList.add(ok?'correct':'wrong');const out=btn.closest('.sim').querySelector('.sim-output');out.textContent=msg;if(ok){const key=out.id.replace('sim-out-','');state.sims[key]=msg;saveState()}}function simText(key,msg){document.getElementById('sim-out-'+key).textContent=msg}function completeSim(key,msg){state.sims[key]=msg;document.getElementById('sim-out-'+key).textContent=msg;saveState()}function advanceProduction(){state.prodStep=Math.min(7,(state.prodStep||0)+1);document.querySelectorAll('#prodLadder .ladder-step').forEach((el,i)=>el.classList.toggle('active',i<=state.prodStep));if(state.prodStep===7)completeSim('production','Production flow complete. Nothing was posted by the OS.');else saveState()}
function filterGlossary(){const q=document.getElementById('glossarySearch').value.toLowerCase();document.querySelectorAll('.glossary-item').forEach(item=>{item.style.display=item.dataset.term.includes(q)?'block':'none'})}
const side=document.getElementById('side'),scrim=document.getElementById('scrim');function closeMenu(){side.classList.remove('open');scrim.classList.remove('show')}document.getElementById('menuBtn').onclick=()=>{side.classList.toggle('open');scrim.classList.toggle('show')};scrim.onclick=closeMenu;
loadState();render();
</script>
</body>
</html>
